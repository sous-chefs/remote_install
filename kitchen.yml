driver:
  name: vagrant

provisioner:
  name: chef_infra
  chef_license: accept
  deprecations_as_errors: true
  policyfile: Policyfile.rb

platforms:
  - name: amazonlinux-2
  - name: centos-7
  - name: centos-8
  - name: debian-9
  - name: debian-10
  - name: fedora-latest
  - name: opensuse-leap-42
  - name: ubuntu-18.04
  - name: ubuntu-20.04

suites:
  - name: default
    provisioner:
      named_run_list: default
